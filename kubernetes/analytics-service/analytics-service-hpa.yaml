apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-hpa
  namespace: analytics-service
spec:
  scaleTargetRef: 
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-deploy
  minReplicas: 1  
  maxReplicas: 3 
  metrics:        
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70 