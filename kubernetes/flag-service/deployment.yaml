apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag-deploy
  namespace: flag-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flag-service # < - deploy ira gerenciar container com essa label Linhas 20
  template:
    metadata:
      labels:
        app: flag-service # < - tag do container
    spec:
      containers:
      - name: flag-service
        image: 832200544765.dkr.ecr.us-east-1.amazonaws.com/flag-service:latest
        ports:
        - containerPort: 8002 # <- apenas indica na documentação
        envFrom:
        - secretRef:
            name: flag-secret
        - configMapRef:
            name: flag-configmap
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 30