apiVersion: v1
kind: Namespace
metadata:
  name:  evaluation-service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service-deploy
  namespace: evaluation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evaluation-service # < - deploy ira gerenciar container com essa label Linhas 20
  template:
    metadata:
      labels:
        app: evaluation-service # < - tag do container
    spec:
      containers:
      - name: evaluation-service
        image: 396580597637.dkr.ecr.us-east-1.amazonaws.com/evaluation-service:latest
        ports:
        - containerPort: 8004 # <- apenas indica na documentação
        envFrom:
        - secretRef:
            name: evaluation-service-secret
        - configMapRef:
            name: evaluation-service-configmap
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 10
          periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: evaluation-service-service
  namespace: evaluation-service
spec:
  selector:
    app: evaluation-service
  type: ClusterIP
  ports:
  - port: 8004
    targetPort: 8004

---
apiVersion: v1
kind: Secret
metadata:
  name: evaluation-service-secret
  namespace: evaluation-service
type: Opaque
data:
  AWS_SQS_URL: aHR0cHM6Ly9zcXMudXMtZWFzdC0xLmFtYXpvbmF3cy5jb20vMzk2NTgwNTk3NjM3L01pbmhhRmlsYQ==
  AWS_REGION: dXMtZWFzdC0x

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: evaluation-service-configmap
  labels:
    app: evaluation-service
data:
  REDIS_URL: #Url Redis
  FLAG_SERVICE_URL: http://localhost:8002
  TARGETING_SERVICE_URL: http://localhost:8003