apiVersion: v1
kind: Namespace
metadata:
  name:  targeting-service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting-service-deploy
  namespace: targeting-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: targeting-service # < - deploy ira gerenciar container com essa label Linhas 20
  template:
    metadata:
      labels:
        app: targeting-service # < - tag do container
    spec:
      containers:
      - name: targeting-service
        image: 396580597637.dkr.ecr.us-east-1.amazonaws.com/targeting-service:latest
        ports:
        - containerPort: 8003 # <- apenas indica na documentação
        envFrom:
        - secretRef:
            name: targeting-service-secret
        - configMapRef:
            name: targeting-service-configmap
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: targeting-service-service
  namespace: targeting-service
spec:
  selector:
    app: targeting-service
  type: ClusterIP
  ports:
  - port: 8003
    targetPort: 8003

---
apiVersion: v1
kind: Secret
metadata:
  name: targeting-service-secret
  namespace: targeting-service
type: Opaque
data:
  POSTGRES_USER: cG9zdGdyZXM=
  POSTGRES_PASSWORD: #Senha correta do banco
  POSTGRES_DB: dGFyZ2V0aW5nX2Ri

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: targeting-service-configmap
  labels:
    app: targeting-service
data:
  DATABASE_URL: #Url do banco
  AUTH_SERVICE_URL: http://localhost:8001


